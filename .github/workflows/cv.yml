name: Build CV

on:
  push:
    branches: [main]
    paths:
      - '_data/profile.yml'
      - 'generate_cv.py'
      - 'cv.tex.in'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-cv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install pyyaml

      - name: Generate cv.tex
        run: python generate_cv.py

      - name: Install LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            latexmk \
            fonts-inter
          fc-cache -fv 2>/dev/null || true

      - name: Compile PDF
        run: |
          xelatex -interaction=nonstopmode cv.tex >/dev/null 2>&1 || true
          xelatex -interaction=nonstopmode cv.tex >/dev/null 2>&1 || true

      - name: Check PDF exists
        run: ls -la cv.pdf

      - name: Copy PDF to assets/cv/
        run: |
          mkdir -p assets/cv
          cp cv.pdf assets/cv/cv.pdf

      - name: Commit PDF & updated cv.tex
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add cv.tex assets/cv/cv.pdf
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-regenerate CV from profile.yml [ci skip]"
            git push
          fi
